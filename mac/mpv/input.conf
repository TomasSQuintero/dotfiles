} add speed 0.5
{ add speed -0.5
] add speed 0.1
[ add speed -0.1

UP add volume 5
DOWN add volume -5

Ctrl+Left   playlist-prev
Ctrl+Right  playlist-next

B script_message bookmarker-menu
b script_message bookmarker-quick-save
ctrl+b script_message bookmarker-quick-load

1 ab-loop
2 screenshot

a cycle audio
s cycle sub

h seek -30
k add volume 5
j add volume -5
l seek 30
