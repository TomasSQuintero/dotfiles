input {
    kb_layout = latam
    kb_options = caps:escape_shifted_capslock,menu:super
    follow_mouse = 1
    sensitivity = 0.3 # -1.0 - 1.0, 0 means no modification.
    numlock_by_default = true
    scroll_factor = 1.0   # default; increase to scroll faster, decrease to slow down

}

device {
    #name = epic-mouse-v1
    #sensitivity = -0.5
}
