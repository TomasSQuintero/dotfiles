$border = rgba(aaaaaaaa)
$bc1 = rgba(f28ba9aa) #pink
$bc2 = rgba(8eb2f699) #blue
$ong = rgba(db9e5daa) #orange

general {
    gaps_in = 4
    gaps_out = 8
    border_size = 0
    col.active_border = $border
    col.inactive_border = rgba(00000000)
    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 15 #antes era 10
    rounding_power = 2

    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = false
        range = 50
        render_power = 5
        # color = rgba(1a1a1a44)
        color = rgba(1a1a1aff)
        # offset = 0.9 0.9
        scale = 0.9
    }

    blur {
        enabled = true
        size = 5
        passes = 3
        # size = 6
        # passes = 3
        # antes lo tenia con size 4 y passes 1

        new_optimizations = true
        vibrancy = 0.1696
    }
}
# layerrule = blur on, match:namespace waybar
# windowrule = opacity 0.65 0.65, match:class sioyek
# windowrule = opacity 0.85 0.85, match:class zen
# windowrule = opacity 0.80 0.80, match:class kitty
windowrule = opacity 0.80 0.80, match:class kitty

