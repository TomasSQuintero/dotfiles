$mainMod = SUPER # Sets "Windows" key as main modifier

bind = $mainMod, Q, killactive,
bind = $mainMod, F, fullscreen, 1
bind = $mainMod SHIFT, F, togglefloating,
bind = $mainMod, space, exec, $menu
bind = ALT, space, exec, $windows
bind = $mainMod, P, layoutmsg, togglesplit

# app launches 
bind = $mainMod, return, exec, $terminal
bind = $mainMod, B, exec, [float; center] kitty -e bluetui
bind = $mainMod, R, exec, kitty -e rmpc
bind = $mainMod, S, exec, localsend

# Move focus with mainMod + vim arrow keys
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move windows within workspace
bind = SUPER CTRL, h, movewindow, l
bind = SUPER CTRL, j, movewindow, d
bind = SUPER CTRL, k, movewindow, u
bind = SUPER CTRL, l, movewindow, r

# Resize windows
bind = SUPER ALT, h, resizeactive, -250 0
bind = SUPER ALT, j, resizeactive, 0 250
bind = SUPER ALT, k, resizeactive, 0 -250
bind = SUPER ALT, l, resizeactive, 250 0

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Move active window to workspace 1-10 silently
bind = $mainMod ALT, 1, movetoworkspacesilent, 1
bind = $mainMod ALT, 2, movetoworkspacesilent, 2
bind = $mainMod ALT, 3, movetoworkspacesilent, 3
bind = $mainMod ALT, 4, movetoworkspacesilent, 4
bind = $mainMod ALT, 5, movetoworkspacesilent, 5
bind = $mainMod ALT, 6, movetoworkspacesilent, 6
bind = $mainMod ALT, 7, movetoworkspacesilent, 7
bind = $mainMod ALT, 8, movetoworkspacesilent, 8
bind = $mainMod ALT, 9, movetoworkspacesilent, 9
bind = $mainMod ALT, 0, movetoworkspacesilent, 10

# Special workspaces
bind = $mainMod, M, togglespecialworkspace, music
bind = $mainMod SHIFT, M, movetoworkspace, special:music
bind = $mainMod ALT, M, movetoworkspacesilent, special:music
bind = , F3, togglespecialworkspace, music
bind = SHIFT, F3, movetoworkspace, special:music
bind = ALT, F3, movetoworkspacesilent, special:music

# switching workspaces
bind = , mouse:275, workspace, e+1
bind = , mouse:276, workspace, e-1
bind = $mainMod, A, workspace, previous
bind = $mainMod, Prior, workspace, e-1
bind = $mainMod, Next, workspace, e+1
bind = $mainMod, mouse_up, workspace, e+1
bind = $mainMod, mouse_down, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# center, pin
bind = $mainMod, C, centerwindow
# bind = $mainMod, T, pin
# bind = $mainMod, T, exec, wl-copy "tomyq1405@gmail.com"

# Requires playerctl
# bindl = , F6, exec, playerctl previous
# bindl = , F7, exec, playerctl play-pause
# bindl = , F8, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioNext, exec, playerctl next

# suspend
# bind = , Pause, exec, systemctl suspend
# bind = SHIFT, Pause, exec, wlogout
bind = , Insert, exec, systemctl suspend
bind = SHIFT, Insert, exec, wlogout

# volume control
# bindle= SHIFT, F8, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
# bindle= SHIFT, F6, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- 
bindle= , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 2%+
bindle= , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 2%- 
bindl = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

# screenshots
# Normal PrintScreen → select area to capture
# bind = , Print, exec, sh -c 'grim -g "$(slurp)" - | tee ~/Pictures/screenshots/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy'
bind = SUPER SHIFT, S, exec, sh -c 'grim -g "$(slurp)" - | tee ~/Pictures/screenshots/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy'
#Shift + PrintScreen → capture entire screen
# bind = SHIFT, Print, exec, grim ~/Pictures/screenshots/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png
bind = CONTROL SUPER SHIFT, S, exec, grim ~/Pictures/screenshots/screenshot-$(date +%Y-%m-%d_%H-%M-%S).png

# animation/gaps toggle
bind = $mainMod, F4, exec, ~/.config/hypr/gamemode.sh

# toggle waybar
bind = SUPER, W, exec, pgrep waybar && killall waybar || waybar &

#clipboard
bind = $mainMod, V, exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# misc logitech function key row

bind = , XF86MonBrightnessDown, exec, zen-browser
bind = SHIFT, XF86MonBrightnessDown, exec, zen-browser --private-window

bind = , XF86MonBrightnessUp, exec, kitty -e yazi
bind = SHIFT, XF86MonBrightnessUp, exec, $fileManager

# bind = SUPER, Tab, exec, zen-browser https://youtube.com
# bind = , XF86Calculator, exec, zen-browser https://youtube.com
# bind = , XF86Calculator, exec, zen-browser

